name: Nightly Build Release

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.meta.outputs.date }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - id: meta
        shell: bash
        run: |
          DATE="$(date -u +'%Y-%m-%d')"
          echo "date=${DATE}" >> "${GITHUB_OUTPUT}"
          echo "release_name=Monolith Launcher Nightly (${DATE})" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            key: linux
          - os: windows-latest
            key: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --locked --version '^2'

      - name: Install Linux dependencies
        if: matrix.key == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install UI dependencies
        working-directory: monolith-ui
        shell: bash
        run: bun install --frozen-lockfile

      - name: Build UI
        working-directory: monolith-ui
        shell: bash
        run: bun run build

      - name: Build Tauri bundles
        working-directory: src-tauri
        shell: bash
        run: cargo tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.key }}
          path: src-tauri/target/release/bundle
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release files
        id: collect_files
        shell: bash
        run: |
          mapfile -t FILES < <(find release-artifacts -type f | sort)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release files found."
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish nightly prerelease
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: nightly
          name: ${{ needs.prepare.outputs.release_name }}
          body: |
            Automated nightly build.
            Commit: ${{ github.sha }}
            Date: ${{ needs.prepare.outputs.date }} UTC
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          makeLatest: false
          artifacts: ${{ steps.collect_files.outputs.files }}
          artifactErrorsFailBuild: true
